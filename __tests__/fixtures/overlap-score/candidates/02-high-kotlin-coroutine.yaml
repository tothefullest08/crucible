problem: |
  Kotlin CoroutineScope must be created outside suspend functions for proper lifecycle management
cause: |
  CoroutineScope created inside suspend functions loses structured concurrency and lifecycle
solution: |
  Use lifecycleScope or viewModelScope or create explicit CoroutineScope outside suspend function
prevention: |
  Always attach CoroutineScope to a lifecycle owner to cancel coroutines when owner is destroyed
