problem: |
  PostgreSQL vacuum autovacuum triggers on heavily updated tables slow queries during business hours
cause: |
  Autovacuum scheduler runs during peak load because default thresholds too aggressive for table size
solution: |
  Tune autovacuum_vacuum_scale_factor per table and schedule manual vacuum during low traffic windows
prevention: |
  Monitor vacuum progress per table add alerts when vacuum runs longer than fifteen minutes
