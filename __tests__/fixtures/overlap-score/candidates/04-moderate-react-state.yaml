problem: |
  React setState batching behavior changed between versions causing race conditions in form handlers
cause: |
  setState is asynchronous and batched so reading state immediately after setState returns old value
solution: |
  Use functional setState setter callback or useEffect to react to state changes instead of reading directly
prevention: |
  Treat state as immutable snapshot during render and never read state synchronously after setState
